<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smoke-free">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Smoke-Free Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2129;
    --panel2: #222c36;
    --accent: #4ade80;
    --accent-dim: #2a6b46;
    --text: #e6edf3;
    --muted: #8b98a5;
    --warn: #f0b429;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom));
    max-width: 640px;
    margin: 0 auto;
  }
  h1 { font-size: 1.4rem; font-weight: 650; margin-bottom: 2px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 18px; }

  .clock {
    background: linear-gradient(160deg, var(--panel2), var(--panel));
    border: 1px solid #2c3742;
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    margin-bottom: 16px;
  }
  .clock .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .timer {
    font-variant-numeric: tabular-nums;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    margin: 8px 0 2px;
  }
  .timer .unit { font-size: 1rem; color: var(--muted); font-weight: 500; margin: 0 6px 0 1px; }
  .quit-since { color: var(--muted); font-size: 0.8rem; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat {
    background: var(--panel);
    border: 1px solid #2c3742;
    border-radius: 14px;
    padding: 16px;
  }
  .stat .k { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat .v { font-size: 1.5rem; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .stat .v.money { color: var(--accent); }
  .stat .v.cigs { color: var(--warn); }

  .section-title { font-size: 0.95rem; font-weight: 600; margin: 18px 0 10px; }

  .milestone {
    background: var(--panel);
    border: 1px solid #2c3742;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    opacity: 0.55;
    transition: opacity 0.3s;
  }
  .milestone.done { opacity: 1; border-color: var(--accent-dim); }
  .milestone > summary {
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; list-style: none;
  }
  .milestone > summary::-webkit-details-marker { display: none; }
  .milestone .chev {
    color: var(--muted); font-size: 0.7rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .milestone[open] .chev { transform: rotate(180deg); }
  .milestone .ms-info {
    color: var(--muted); font-size: 0.82rem; line-height: 1.55;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #2c3742;
  }
  .milestone .ms-info .src {
    display: block; margin-top: 6px; color: var(--accent); font-size: 0.75rem;
  }
  .milestone .icon {
    width: 26px; height: 26px; flex-shrink: 0;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 0.85rem;
    background: #2c3742; color: var(--muted);
  }
  .milestone.done .icon { background: var(--accent); color: #0f1419; }
  .milestone .body { flex: 1; }
  .milestone .body .t { font-weight: 600; font-size: 0.9rem; }
  .milestone .body .d { color: var(--muted); font-size: 0.8rem; }
  .milestone .when { color: var(--muted); font-size: 0.75rem; text-align: right; white-space: nowrap; }
  .milestone .progress {
    height: 4px; background: #2c3742; border-radius: 2px; margin-top: 6px; overflow: hidden;
  }
  .milestone .progress > div { height: 100%; background: var(--accent); border-radius: 2px; }

  .settings {
    background: var(--panel); border: 1px solid #2c3742; border-radius: 14px;
    padding: 16px; margin-top: 18px;
  }
  .settings summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; }
  .field { margin-top: 12px; }
  .field label { display: block; color: var(--muted); font-size: 0.8rem; margin-bottom: 4px; }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid #2c3742; border-radius: 8px;
    padding: 9px 11px; color: var(--text); font-size: 0.95rem; font-family: inherit;
  }
  .btn {
    margin-top: 14px; background: var(--accent); color: #0f1419; border: none;
    border-radius: 8px; padding: 10px 16px; font-weight: 650; font-size: 0.9rem; cursor: pointer;
    font-family: inherit;
  }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid #2c3742; margin-left: 8px; }
  .note { color: var(--muted); font-size: 0.78rem; margin-top: 12px; }
  .saved-flash { color: var(--accent); font-size: 0.8rem; margin-left: 10px; opacity: 0; transition: opacity 0.2s; }
  .saved-flash.show { opacity: 1; }
</style>
</head>
<body>
  <h1>Smoke-free</h1>
  <div class="sub" id="encourage">Loading…</div>

  <div class="clock">
    <div class="label">Time since last cigarette</div>
    <div class="timer" id="timer">—</div>
    <div class="quit-since" id="quitSince"></div>
  </div>

  <div class="grid">
    <div class="stat">
      <div class="k">Money saved</div>
      <div class="v money" id="money">—</div>
    </div>
    <div class="stat">
      <div class="k">Cigarettes not smoked</div>
      <div class="v cigs" id="cigs">—</div>
    </div>
  </div>

  <div class="section-title">Health recovered</div>
  <div id="milestones"></div>

  <details class="settings">
    <summary>Settings</summary>
    <div class="field">
      <label>Quit date & time</label>
      <input type="datetime-local" id="quitInput">
    </div>
    <div class="field">
      <label>Cigarettes per day (before)</label>
      <input type="number" id="perDayInput" min="1" step="1">
    </div>
    <div class="field">
      <label>Price per pack (€)</label>
      <input type="number" id="packPriceInput" min="0" step="0.01">
    </div>
    <div class="field">
      <label>Cigarettes per pack</label>
      <input type="number" id="packSizeInput" min="1" step="1">
    </div>
    <div>
      <button class="btn" id="saveBtn">Save</button>
      <button class="btn ghost" id="resetBtn">Reset quit time to now</button>
      <span class="saved-flash" id="savedFlash">saved ✓</span>
    </div>
    <div class="note">Settings are stored in this browser and persist between visits.</div>
  </details>

<script>
const DEFAULTS = {
  quitISO: "2026-06-10T14:00",
  perDay: 20,
  packPrice: 13,
  packSize: 20
};

const KEY = "smokefree:settings";

function loadSettings() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return { ...DEFAULTS, ...JSON.parse(raw) };
  } catch (e) { /* corrupt or unavailable */ }
  saveSettings(DEFAULTS, true);
  return { ...DEFAULTS };
}

function saveSettings(s, silent) {
  try {
    localStorage.setItem(KEY, JSON.stringify(s));
    if (!silent) {
      const f = document.getElementById("savedFlash");
      f.classList.add("show");
      setTimeout(() => f.classList.remove("show"), 1500);
    }
  } catch (e) { console.error("save failed", e); }
}

let settings = null;

const MILESTONES = [
  { ms: 20*60e3,           t: "Heart rate & blood pressure drop", d: "Pulse and blood pressure fall back toward normal levels.",
    info: "Nicotine is a stimulant: it drives the release of adrenaline, which speeds the heart and tightens blood vessels. As the last dose wears off that pressure on your cardiovascular system lifts — within about 20 minutes heart rate and blood pressure begin easing toward your baseline, and blood flow to the hands and feet improves.",
    src: "European Society of Cardiology" },
  { ms: 8*3600e3,          t: "Carbon monoxide halves",      d: "Blood carbon monoxide drops by half and oxygen levels climb.",
    info: "Smoke is full of carbon monoxide, which binds to haemoglobin roughly 200× more tightly than oxygen, forming carboxyhaemoglobin and starving tissues of oxygen. CO has a half-life of about 4–6 hours, so by around 8 hours smoke-free it has fallen by about half and your blood starts carrying more oxygen again.",
    src: "European Respiratory Society" },
  { ms: 12*3600e3,         t: "Blood oxygen back to normal", d: "Carbon monoxide clears, so red blood cells carry full oxygen again.",
    info: "As carboxyhaemoglobin keeps dropping, haemoglobin is freed to do its real job, and blood-oxygen saturation returns to a non-smoker's range within roughly half a day. Muscles and organs receive a fuller oxygen supply, which is why early light-headedness and breathlessness start to ease.",
    src: "World Health Organization" },
  { ms: 24*3600e3,         t: "Heart-attack risk starts dropping", d: "Blood gets less sticky; the early drop in heart-attack risk begins.",
    info: "Smoking makes platelets stickier and raises fibrinogen, encouraging clots to form in narrowed arteries — the trigger for most heart attacks. Within a day of stopping, platelet activity and clotting tendency begin to normalise, and population studies show acute coronary risk starts falling almost immediately.",
    src: "European Heart Journal (ESC)" },
  { ms: 48*3600e3,         t: "Taste & smell sharpen",       d: "No nicotine left in the body; nerve endings regrow and food tastes better.",
    info: "Tobacco smoke blunts and damages the olfactory receptors in the nose and the taste buds on the tongue. With nicotine now fully eliminated, these nerve endings begin regenerating; within a couple of days many people notice food and smells becoming distinctly more vivid.",
    src: "European Respiratory Society" },
  { ms: 72*3600e3,         t: "Breathing gets easier",       d: "Bronchial tubes relax and lung capacity rises; energy climbs.",
    info: "Nicotine and smoke irritants keep the bronchi constricted. By around three days, with nicotine cleared, the bronchial tubes relax and airway resistance drops, so air moves more freely and usable lung capacity rises. Better oxygen delivery is why many feel a noticeable lift in energy around now.",
    src: "NHS" },
  { ms: 7*24*3600e3,       t: "Nicotine marker clearing",    d: "Cotinine, the marker a blood or urine test detects, is nearly gone; taste and smell stronger.",
    info: "Clinicians rarely measure nicotine itself (gone within 1–2 days) — they test for cotinine, its longer-lived metabolite with a half-life near 16 hours. After about a week off tobacco, cotinine in blood, urine and saliva has fallen close to non-smoker levels, the objective marker labs use to confirm you've stopped.",
    src: "Karolinska Institutet / WHO" },
  { ms: 14*24*3600e3,      t: "Circulation improves",        d: "Walking and exercise get noticeably easier as blood flow improves.",
    info: "Beyond the early relaxation of blood vessels, the endothelium — the inner lining that lets arteries widen on demand — starts recovering its function, and circulation to the limbs and skin measurably improves over the first weeks. Walking, stairs and exercise begin to feel easier.",
    src: "European Society of Cardiology" },
  { ms: 30*24*3600e3,      t: "Lungs self-cleaning returns", d: "Cilia regrow and start sweeping mucus and bacteria out; less coughing.",
    info: "The airways are lined with cilia — microscopic hair-like sweepers that smoking paralyses and destroys. Within weeks they regrow and resume clearing mucus, dust and microbes from the lungs. A short-lived increase in coughing can actually be a sign this clean-up is restarting.",
    src: "European Respiratory Society" },
  { ms: 90*24*3600e3,      t: "Lung function up to +10%",    d: "Lung function measurably improves; coughing and shortness of breath decline.",
    info: "With airways less inflamed and cilia working again, measurable lung function — such as FEV1, the volume you can force out in one second — can improve by up to around 10% over the first one to three months. Breathlessness during exertion noticeably declines.",
    src: "European Respiratory Society" },
  { ms: 182*24*3600e3,     t: "Coughing & mucus drop",       d: "Daily cough eases and many handle stress without a cigarette.",
    info: "Chronic mucus over-production and the smoker's cough subside as airway inflammation continues to settle, and lower airway irritation means fewer respiratory infections. By now the body has largely adapted to life without nicotine, and many report steadier mood and better sleep.",
    src: "WHO Regional Office for Europe" },
  { ms: 273*24*3600e3,     t: "Lungs significantly healed",  d: "Cilia have largely recovered; shortness of breath, congestion and fatigue decrease.",
    info: "By around nine months the cilia have largely regrown and the lungs' self-cleaning is close to normal, so coughing, sinus congestion, shortness of breath and fatigue are markedly reduced. The lungs' natural defences against infection are substantially restored.",
    src: "European Respiratory Society" },
  { ms: 365*24*3600e3,     t: "Heart disease risk halved",   d: "Risk of coronary heart disease is about half that of a smoker.",
    info: "After one smoke-free year your excess risk of coronary heart disease is roughly half that of someone who kept smoking. Improvements in cholesterol balance, blood-vessel function and reduced clotting all feed into this drop.",
    src: "European Society of Cardiology" },
  { ms: 2*365*24*3600e3,   t: "Stroke risk falling",         d: "Stroke risk drops toward that of a non-smoker.",
    info: "Lower clotting tendency and healthier arteries steadily reduce stroke risk. European cohort studies show it falling substantially in the years after quitting, moving toward the level of someone who never smoked.",
    src: "European Stroke Organisation" },
  { ms: 5*365*24*3600e3,   t: "Several cancer risks halved", d: "Risk of mouth, throat, esophagus and bladder cancer is cut in half.",
    info: "As the lining of the mouth, throat, oesophagus and bladder repairs itself and sheds smoke-damaged cells, the risk of cancers at these sites falls to about half that of a continuing smoker within roughly five years.",
    src: "European Code Against Cancer (IARC/WHO)" },
  { ms: 10*365*24*3600e3,  t: "Lung cancer risk halved",     d: "Risk of dying from lung cancer is about half that of a smoker.",
    info: "Around ten years on, the risk of dying from lung cancer is about half that of a continuing smoker, and the risk of cancers of the larynx and pancreas also declines. The landmark British Doctors Study found that stopping — especially before middle age — recovers most of the life expectancy smoking would have cost.",
    src: "British Doctors Study (Doll & Peto) / IARC" },
  { ms: 15*365*24*3600e3,  t: "Heart risk like a never-smoker", d: "Risk of coronary heart disease is close to that of someone who never smoked.",
    info: "After about fifteen years smoke-free, the risk of coronary heart disease approaches that of a person who never smoked — by this point the cardiovascular system has largely recovered from the damage.",
    src: "European Society of Cardiology / WHO" },
];

function fmtDuration(ms) {
  const s = Math.floor(ms/1000);
  const days = Math.floor(s/86400);
  const hrs = Math.floor((s%86400)/3600);
  const mins = Math.floor((s%3600)/60);
  const secs = s%60;
  return { days, hrs, mins, secs };
}

function fmtWhen(ms) {
  const m = Math.floor(ms/60e3);
  if (m < 60) return m + "m";
  const h = Math.floor(ms/3600e3);
  if (h < 24) return h + "h";
  const d = Math.floor(ms/86400e3);
  if (d < 7) return d + (d===1?" day":" days");
  if (d < 28) { const w = Math.round(d/7); return w + (w===1?" week":" weeks"); }
  const mo = Math.round(ms/(30.44*86400e3));
  if (mo < 12) return mo + (mo===1?" month":" months");
  const y = Math.round(ms/(365*86400e3));
  return y + (y===1?" year":" years");
}

const encouragements = [
  "One breath at a time. You're doing it.",
  "Every hour is a small win. Keep going.",
  "Your body is busy repairing itself right now.",
  "The craving passes. You don't have to.",
  "Money in your pocket, air in your lungs."
];

function render() {
  if (!settings) return;
  const quit = new Date(settings.quitISO);
  const now = new Date();
  const elapsed = Math.max(0, now - quit);

  const { days, hrs, mins, secs } = fmtDuration(elapsed);
  document.getElementById("timer").innerHTML =
    `${days}<span class="unit">d</span>${hrs}<span class="unit">h</span>${mins}<span class="unit">m</span>${secs}<span class="unit">s</span>`;
  document.getElementById("quitSince").textContent =
    "Since " + quit.toLocaleString([], {weekday:"short", day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit"});

  const perMs = settings.perDay / 86400e3;
  const cigsAvoided = elapsed * perMs;
  const costPerCig = settings.packPrice / settings.packSize;
  const money = cigsAvoided * costPerCig;

  document.getElementById("money").textContent = "€" + money.toFixed(2);
  document.getElementById("cigs").textContent = Math.floor(cigsAvoided).toLocaleString();

  document.getElementById("encourage").textContent =
    encouragements[Math.floor(elapsed/3600e3) % encouragements.length];

  const wrap = document.getElementById("milestones");
  const openIdx = new Set(
    [...wrap.querySelectorAll("details.milestone")]
      .map((d, i) => (d.open ? i : -1)).filter(i => i >= 0)
  );
  wrap.innerHTML = "";
  MILESTONES.forEach((m, i) => {
    const done = elapsed >= m.ms;
    const pct = Math.min(100, (elapsed/m.ms)*100);
    let whenText;
    if (done) {
      const reached = new Date(quit.getTime() + m.ms);
      whenText = reached.getFullYear() === now.getFullYear()
        ? reached.toLocaleString([], {day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit"})
        : reached.toLocaleDateString([], {day:"2-digit", month:"short", year:"numeric"});
    } else {
      whenText = "at " + fmtWhen(m.ms);
    }
    const el = document.createElement("details");
    el.className = "milestone" + (done ? " done" : "");
    if (openIdx.has(i)) el.open = true;
    el.innerHTML = `
      <summary>
        <div class="icon">${done ? "✓" : ""}</div>
        <div class="body">
          <div class="t">${m.t}</div>
          <div class="d">${m.d}</div>
          ${done ? "" : `<div class="progress"><div style="width:${pct}%"></div></div>`}
        </div>
        <div class="when">${whenText}</div>
        <span class="chev">▾</span>
      </summary>
      <div class="ms-info">${m.info}<span class="src">— ${m.src}</span></div>
    `;
    wrap.appendChild(el);
  });
}

function fillForm() {
  document.getElementById("quitInput").value = settings.quitISO;
  document.getElementById("perDayInput").value = settings.perDay;
  document.getElementById("packPriceInput").value = settings.packPrice;
  document.getElementById("packSizeInput").value = settings.packSize;
}

document.getElementById("saveBtn").addEventListener("click", () => {
  settings = {
    quitISO: document.getElementById("quitInput").value || settings.quitISO,
    perDay: parseFloat(document.getElementById("perDayInput").value) || settings.perDay,
    packPrice: parseFloat(document.getElementById("packPriceInput").value) || settings.packPrice,
    packSize: parseFloat(document.getElementById("packSizeInput").value) || settings.packSize,
  };
  saveSettings(settings);
  render();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  settings.quitISO = local;
  saveSettings(settings);
  fillForm();
  render();
});

settings = loadSettings();
fillForm();
render();
setInterval(render, 1000);
</script>
</body>
</html>
